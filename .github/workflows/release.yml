name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SHORT="${GITHUB_SHA::7}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha=${SHORT}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/ctrahey/webhook-router:${{ steps.tags.outputs.version }}
            docker.io/ctrahey/webhook-router:sha-${{ steps.tags.outputs.sha }}
          provenance: true
          sbom: true
      - uses: sigstore/cosign-installer@v3
      - name: Cosign keyless sign
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes docker.io/ctrahey/webhook-router:${{ steps.tags.outputs.version }}
          cosign sign --yes docker.io/ctrahey/webhook-router:sha-${{ steps.tags.outputs.sha }}
